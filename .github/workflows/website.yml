name: publish-websites

on:
  workflow_dispatch:
  push:
  pull_request:
#  schedule:
#    - cron: "15 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.19"
          enable-cache: true
      - name: Cache the virtualenv
        uses: actions/cache@v5
        with:
          path: ./.venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/uv.lock') }}
      - name: Install dependencies
        run: uv sync --no-install-project
      - name: Build site for current week
        run: uv run properdocs build -d public -f properdocs.yml
      - name: Build full site
        run: CALENDAR_TODAY="today in 10 years" uv run properdocs build -f properdocs-timeless.yml -d public-timeless
      - name: Upload site pages artifact
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@v5
        with:
          path: public-timeless
      - name: Deploy to GitHub Pages
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch')
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Deploy to Cloudflare Pages
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch')||
          (github.event_name == 'schedule')
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --commit-dirty=true
