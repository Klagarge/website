site_name: Construction de systèmes embarqués sous Linux
site_description: Construction de systèmes embarqués sous Linux
copyright: "Copyright &copy; {{ cal.today.year }} Haute école d'ingénierie et d'architecture of Fribourg"

extra:
  show_page_revision_on_all_pages: false
  teacher_name: 'Jacques Supcik'
  kver: 5.15.148

  social:
    - icon: material/web
      link: https://www.msengineering.ch/
    - icon: fontawesome/brands/facebook
      link: https://www.facebook.com/hesso/
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/hes_so
    - icon: fontawesome/brands/linkedin
      link: https://ch.linkedin.com/school/university-of-applied-sciences-western-switzerland/
    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/hessoeducation/
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/hessofilms

theme:
  name: materialx
  language: 'fr'
  topbar_style: primary

  palette:
    # Palette toggle for light mode
    - scheme: hesso
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: 'Roboto'
    code: 'IBM Plex Mono'
  custom_dir: 'overrides/'
  icon:
    logo: material/school
  favicon: 'assets/images/favicon.ico'
  features:
    - content.code.annotate
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.tracking
    - content.tabs.link
    - content.code.copy

extra_css:
  - 'stylesheets/extra.css'

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  admonition: {}
  extra: {}
  smarty:
    smart_angled_quotes: true
    substitutions:
      left-angle-quote: '&laquo;&#xA0;'
      right-angle-quote: '&#xA0;&raquo;'
  mkdcomments: {}
  footnotes: {}
  codehilite: {}
  pymdownx.arithmatex:
    generic: true
  pymdownx.betterem:
    smart_enable: all
  pymdownx.highlight: {}
  pymdownx.caret: {}
  pymdownx.critic: {}
  pymdownx.details: {}
  pymdownx.keys: {}
  pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
  pymdownx.inlinehilite: {}
  pymdownx.magiclink: {}
  pymdownx.mark: {}
  pymdownx.smartsymbols: {}
  pymdownx.superfences:
    custom_fences:
      - name: mermaid
        class: mermaid
        format: !!python/name:pymdownx.superfences.fence_code_format
  pymdownx.tabbed:
    alternate_style: true
  pymdownx.tasklist:
    custom_checkbox: true
  pymdownx.tilde: {}
  mdx_math: {}
  attr_list: {}
  md_in_html: {}

plugins:
  - search
  - exclude-search:
      exclude_unreferenced: true
  - git-revision-date-localized:
      enable_creation_date: false
      fallback_to_build_date: true
      locale: fr
      timezone: Europe/Zurich
      enabled: true
  - open-in-new-tab
  - calendar
  - jconfig:
      items:
        - copyright
  - include-markdown:
      opening_tag: '{!'
      closing_tag: '!}'
  - awesome-pages
  - macros
  - pages-j2
